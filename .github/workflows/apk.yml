name: Build Android APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          python3-pip \
          build-essential \
          git \
          zip \
          unzip \
          autoconf \
          libtool \
          pkg-config \
          zlib1g-dev \
          libffi-dev \
          libssl-dev \
          openjdk-17-jdk \
          ant

    - name: Install python-for-android and Cython
      run: |
        pip install --upgrade pip
        pip install cython==0.29.36 python-for-android

    - name: Build APK with p4a
      run: |
        p4a create \
          --name="IABasica" \
          --package=org.ia.iabasica \
          --version=0.1 \
          --bootstrap=sdl2 \
          --requirements=python3,kivy,numpy \
          --arch=arm64-v8a \
          --dest_dir=./final-apk \
          --android_api=34 \
          --ndk-api=24 \
          --debug

    - name: Find and Move APK
      run: |
        mkdir -p bin
        find ./final-apk -name "*.apk" -exec cp {} bin/ \;

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: package
        path: bin/*.apk
